<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>isaacmaster.com</title>
    <style>
        /* Base Page Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f7f7f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        /* Container to keep everything aligned */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Perfect spacing between chess board and button */
        }

        /* Minimal Chess Board Design */
        .chess-container {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 2px solid #333;
        }

        @media (max-width: 520px) {
            .board {
                grid-template-columns: repeat(8, 40px);
                grid-template-rows: repeat(8, 40px);
            }
        }

        .tile {
            width: 100%;
            height: 100%;
        }

        /* Clean, flat, high-contrast minimal colors */
        .light {
            background-color: #f0d9b5;
        }

        .dark {
            background-color: #b58863;
        }

        /* YouTube Link Button Component */
        .yt-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background-color: #111;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .yt-button:hover {
            background-color: #ff0000; /* Distinct YouTube Red on hover */
        }

        .yt-button:active {
            transform: scale(0.98);
        }

        .yt-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="chess-container">
            <div class="board" id="chessBoard"></div>
        </div>

        <a href="https://www.youtube.com/@isaacjmaster" target="_blank" rel="noopener noreferrer" class="yt-button">
            <svg class="yt-icon" viewBox="0 0 24 24">
                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
            Watch on YouTube
        </a>
    </div>

    <script>
        // JS helper to instantly generate a minimal 8x8 checker grid layout
        const board = document.getElementById('chessBoard');
        
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                
                // Checker pattern formula
                if ((row + col) % 2 === 0) {
                    tile.classList.add('light');
                } else {
                    tile.classList.add('dark');
                }
                
                board.appendChild(tile);
            }
        }
    </script>
</body>
</html>
