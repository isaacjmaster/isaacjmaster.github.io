<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJM</title>
    <style>
        /* This is embedded CSS so you don't even need a separate style sheet yet */
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            color: #333;
            padding: 40px;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #111;
        }
        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World</h1>
        <p>More to come...</p>
    </div>

</body>
</html>
