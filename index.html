<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fun</title>
    <style>
        /* FIXED: Added the body selector so the browser knows what to style */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div style="position: absolute; top: 10%; left: 5%; color: white; z-index: 10; pointer-events: none;">
        <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; background: linear-gradient(45deg, #00ffcc, #0077ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">WELCOME TO THE FUTURE</h1>
        <p style="color: #8a8a9e; font-size: 1.1rem;">Move your mouse to warp the view.</p>
    </div>

    <script>
        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 2. Create the 3D Object (Torus Knot)
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        
        const material = new THREE.MeshBasicMaterial({
            color: 0x00ffcc,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        
        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);

        camera.position.z = 30;

        // 3. Mouse Interaction Tracking
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        // Changed to 'let' so we can update them on window resize
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Handle window resizing seamlessly
        window.addEventListener('resize', () => {
            // OPTIMIZATION: Update halves so mouse tracking stays centered
            windowHalfX = window.innerWidth / 2;
            windowHalfY = window.innerHeight / 2;

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 4. Animation Loop
        const animate = () => {
            requestAnimationFrame(animate);

            // Constant automatic spinning
            torusKnot.rotation.x += 0.005;
            torusKnot.rotation.y += 0.01;

            // Smooth parallax effect based on mouse movement
            targetX = mouseX * 0.001; // Dialed down the multiplier slightly for smoother tracking
            targetY = mouseY * 0.001;

            torusKnot.rotation.y += 0.05 * (targetX - torusKnot.rotation.y);
            torusKnot.rotation.x += 0.05 * (targetY - torusKnot.rotation.x);

            renderer.render(scene, camera);
        };

        animate();
    </script>
</body>
</html>
