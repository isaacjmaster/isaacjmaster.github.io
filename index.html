<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>isaacmaster.com</title>
    
    <!-- Include Libraries for Playability -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body { background-color: #f7f7f7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        #myBoard { width: 400px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
        
        .yt-button { 
            display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; 
            background-color: #111; color: #fff; text-decoration: none; font-size: 14px; 
            border-radius: 6px; transition: background-color 0.2s;
        }
        .yt-button:hover { background-color: #ff0000; }
    </style>
</head>
<body>

    <div class="container">
        <div id="myBoard"></div>
        <a href="https://www.youtube.com/@isaacjmaster" target="_blank" class="yt-button">Watch on YouTube</a>
    </div>

    <script>
        var board = null;
        var game = new Chess();

        function makeAiMove() {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            // Simple "Moderate" AI: It looks for any move that captures a piece.
            // If none, it picks a random move.
            var captureMoves = possibleMoves.filter(m => m.includes('x'));
            var move = captureMoves.length > 0 
                ? captureMoves[Math.floor(Math.random() * captureMoves.length)]
                : possibleMoves[Math.floor(Math.random() * possibleMoves.length)];

            game.move(move);
            board.position(game.fen());
        }

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            window.setTimeout(makeAiMove, 250);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop
        };
        
        board = Chessboard('myBoard', config);
    </script>
</body>
</html>
