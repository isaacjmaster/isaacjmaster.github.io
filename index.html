<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isaac J Master</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f0f0f; /* Dark background to match YT dark mode */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .youtube-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 24px 48px;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #ffffff;
            background-color: #ff0000; /* YouTube Red */
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        /* Hover & Tap Effects */
        .youtube-btn:hover {
            transform: scale(1.05);
            background-color: #cc0000;
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.5);
        }

        .youtube-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(255, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <a href="https://www.youtube.com/@isaacjmaster/featured" class="youtube-btn" target="_blank" rel="noopener noreferrer">
        Visit My YouTube Channel
    </a>

</body>
</html>
